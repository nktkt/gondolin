# ---------------------------------------------------------------------------
# CUDA Runtime
# ---------------------------------------------------------------------------

[cuda]
trust_kind = "ffi"
source_root = "csrc/cuda/"
notes = """
Files under `csrc/cuda/` are trusted FFI code. Lean checks shape metadata
around calls, but kernel memory safety, launch behavior, and numerical
behavior are outside Lean's proof kernel. CUDA buffers store float32 and Lean
`Float` values are converted to/from float32 at the buffer boundary in
`csrc/cuda/tensor/gondolin_cuda_tensor.cu`. Buffer finalizers free device
memory through `cudaFree`; this is safe under the current default-stream
runtime where launches and host copies are ordered through the default
stream. Future user streams or async graph replay would require revisiting
finalizer/free ordering.
"""

[[cuda.precision_path]]
name = "fp32"
lean_file = "NN/Runtime/Autograd/Engine/Cuda/Kernels.lean"
backend = "cublasSgemmStridedBatched"
csrc_file = "csrc/cuda/kernels/gondolin_cuda_kernels.cu"

[[cuda.precision_path]]
name = "fp64"
lean_file = "NN/Runtime/Autograd/Engine/Cuda/DGemm.lean"
backend = "cublasDgemm"
csrc_file = "csrc/cuda/blas/gondolin_dgemm_cuda.cu"

[cuda.deterministic_reductions]
description = "Opt-in mode that replaces atomicAdd-based accumulation paths with fixed-order algorithms (slower, bit-stable across runs on the same GPU)."
lean_enable = "let _ := Runtime.Autograd.Cuda.Buffer.setDeterministicReductionsChecked true"
env_vars = ["GONDOLIN_CUDA_DETERMINISTIC_REDUCTIONS", "GONDOLIN_DETERMINISTIC_REDUCTIONS"]
covers = [
  "Buffer.reduceSum",
  "Buffer.reduceMean",
  "reduceFromBroadcastTo",
  "reduceSumAxis",
  "scatterAdd",
  "scatterAddRows",
  "max_pool* (2D and N-D)",
  "avg_pool* (2D and N-D)",
  "smooth_max_pool* (2D and N-D)",
]
does_not_cover = [
  "RNG nondeterminism (manage seeds/counters explicitly)",
  "differences across GPU architectures, CUDA toolkit versions, or driver versions",
  "kernels not on the deterministic-reductions allowlist",
]

[cuda.max_pooling]
notes = "Follows Gondolin spec (PyTorch-style -inf padding, ignore padded cells). Backward tie-breaking is Gondolin-spec row-major deterministic when deterministic reductions are enabled; external runtimes may choose different policies."

[cuda.flash_attention]
spec_file = "NN/Spec/Layers/FlashAttention.lean"
runtime_file = "NN/Runtime/Autograd/Engine/Cuda/Kernels.lean"
csrc_file = "csrc/cuda/kernels/gondolin_cuda_kernels.cu"
denotation = "Over the spec semantics, the fused-operator denotation matches the standard `QK^T -> mask -> softmax -> PV` graph."
notes = """
Fused forward/VJP kernels operate over already-split heads and favor clarity
and correctness over a production clone of Dao-AILab's tiled implementation.
The Lean equalities are definitional denotation checks, not proofs of a tiled
online-softmax recurrence. CUDA memory behavior and float32 arithmetic remain
an FFI trust boundary.
"""
references = [
  "FlashAttention (arXiv:2205.14135)",
  "FlashAttention-2 (arXiv:2307.08691)",
  "FlashAttention-3 (arXiv:2407.08608)",
  "Dao-AILab/flash-attention",
]

[cuda.attention_mask]
convention = "Finite big-negative mask-fill `-1000` in the spec and CUDA fused kernels, not PyTorch SDPA's conceptual `-inf` masking."
notes = "In float32 this normally underflows masked probabilities to zero after max-subtraction; a documented semantic convention rather than a theorem of bit-identical PyTorch masking."

[cuda.kernel_launch]
notes = "Tensor/view kernels rely on default-stream ordering and host copies for synchronization; conv/pool kernels synchronize explicitly after exported operations for clearer error attribution. Both policies are outside Lean's kernel."

