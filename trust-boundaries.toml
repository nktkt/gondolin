# ---------------------------------------------------------------------------
# Lean-side opaques that are not FFI but still part of the trust surface.

[[opaque_non_ffi]]
name = "NN.MLTheory.CROWN.Lyapunov.CrownOracleWitness"
purpose = "Abstract witness type for the external Lyapunov oracle."

[[opaque_non_ffi]]
name = "NN.MLTheory.CROWN.betaAt"
