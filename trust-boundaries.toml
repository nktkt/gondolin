# ---------------------------------------------------------------------------
# External Numeric Oracles
# ---------------------------------------------------------------------------

[[external_oracle]]
name = "CROWN/Lyapunov certificate generator"
trust_kind = "oracle"
isolated_by = "crown_oracle"
notes = "Lean does not prove that the external CROWN run was complete or correctly implemented."

[[external_oracle]]
name = "Arb / python-flint"
trust_kind = "oracle"
root = "NN/Floats/Arb/"
notes = "External subprocess backend. Useful for high-quality interval evidence, but Arb responses remain oracle results unless the relevant certificate is independently checked in Lean."

[[external_oracle]]
name = "PyTorch import/export scripts"
trust_kind = "external_producer"
notes = "External producers of weights, examples, or JSON artifacts. Gondolin can parse and replay those artifacts, but PyTorch training itself is not part of Lean's trusted kernel."

[[external_oracle]]
name = "Julia wrapper"
trust_kind = "external_producer"
lean_file = "NN/Runtime/External/Julia.lean"
env_var = "GONDOLIN_JULIA"
fallback = "julia on PATH"
producer_scripts = "scripts/verification/splines/"
fixtures = "NN/Examples/Verification/Splines/"
notes = "Intended for `untrusted producer, Lean checker` workflows such as the piecewise-polynomial spline certificate workflow. Compiles even when Julia is not installed."

[[external_oracle]]
name = "Julia spline / PINN artifacts"
trust_kind = "external_producer"
notes = "Trusted only after a Lean checker validates the small certificate data: cell domains, polynomial coefficients, interval bounds, and claimed residual inequalities. Lean does not trust Julia's fitting process, optimizer, GPU use, or floating-point arithmetic merely because the subprocess returned successfully."
