# ---------------------------------------------------------------------------
# Lean Axioms
# ---------------------------------------------------------------------------
# Kernel-level assumptions. Each axiom must be allowlisted in repo_lint.py and
# named here with a one-sentence rationale.

[[axiom]]
name = "crown_oracle"
file = "NN/MLTheory/CROWN/Lyapunov/Oracle.lean"
rationale = "External CROWN checker produces a `CrownOracleWitness` for a Lyapunov certificate; given the witness, the certificate soundly bounds V and Vdot over the stated region."

[[axiom]]
name = "instNonemptyBuffer"
file = "NN/Runtime/Autograd/Engine/Cuda/Trusted.lean"
rationale = "The external CUDA/stub runtime can construct values of the opaque `Cuda.Buffer` type."

# ---------------------------------------------------------------------------
# Prop-Valued Contracts
# ---------------------------------------------------------------------------
# Not kernel axioms by themselves: theorems using one are conditional on the
# caller supplying the fields. Listed so that public docs make those
# assumptions visible.

[[prop_contract]]
name = "Gondolin.Floats.IEEE754.Float32Bridge.RuntimeFloat32MatchesIEEE32Exec"
purpose = "Runtime Float32 primitives match the executable IEEE32 model at the bit level."

[[prop_contract]]
name = "NN.MLTheory.CROWN.CrownTransferSound"
purpose = "Transfer-rule soundness for graph-CROWN certificate theorems under backend/oracle-dependent relaxations."

[[prop_contract]]
name = "NN.MLTheory.Proofs.Approximation.FloatInterval.OpsExact.Sound"
purpose = "Local operation-level exact interval soundness for finite IEEE32 interval arithmetic."

# ---------------------------------------------------------------------------
