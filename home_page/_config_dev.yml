#
# GitHub Pages project sites are hosted at `/<repo>/` (so `baseurl: "/Gondolin"` is correct for
# deployment), but that breaks local preview links unless you serve under that subpath.
#
# Use with:
#   bundle exec jekyll serve --config _config.yml,_config_dev.yml

