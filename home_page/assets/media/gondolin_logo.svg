      <stop offset="0" stop-color="#157878"/>
      <stop offset="1" stop-color="#0e5252"/>
    </linearGradient>
    <linearGradient id="f" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffdd88"/>
